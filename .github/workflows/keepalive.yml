name: Keep Supabase awake

# Supabase's free tier pauses a project after ~7 days with no activity. This
# pings a tiny read-only DB-touch endpoint once a day so the project never goes
# idle — no paid plan required. It runs independently of the reminder cron
# (no shared secret), so it keeps working even if reminders aren't configured.
on:
  schedule:
    - cron: "30 21 * * *" # 21:30 UTC daily (offset from the 09:00 reminder cron)
  workflow_dispatch: {}

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the database
        # Render's free tier sleeps when idle and takes ~1 min to wake, so allow
        # retries and a generous timeout. One successful hit per week is enough
        # to prevent the pause; daily gives plenty of margin.
        run: |
          curl -fsS --retry 3 --retry-delay 30 --retry-all-errors --max-time 180 \
            "${{ vars.BACKEND_URL || 'https://yopey-backend.onrender.com' }}/api/keepalive"

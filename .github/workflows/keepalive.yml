name: Keep backend and Supabase warm

# Pings a tiny read-only DB-touch endpoint every 10 minutes so:
#  - the free Supabase project never pauses (it idles after ~7 days), and
#  - Render's free web service rarely sleeps (it naps after ~15 min idle), so
#    the first chat message doesn't wait on a ~50s cold start.
# The endpoint is read-only and exposes no data, and runs independently of the
# reminder cron (no shared secret). Note: GitHub's scheduler isn't perfectly
# punctual for short intervals, so the real gap can occasionally exceed 10 min.
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the database
        # Render's free tier may still be waking on the first hit, so allow
        # retries and a generous timeout.
        run: |
          curl -fsS --retry 3 --retry-delay 30 --retry-all-errors --max-time 180 \
            "${{ vars.BACKEND_URL || 'https://yopey-backend.onrender.com' }}/api/keepalive"
